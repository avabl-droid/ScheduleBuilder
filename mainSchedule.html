<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shift Scheduler</title>
    <link rel="stylesheet" href="scheduleStyles.css">
</head>

<body data-page="managerSchedule">
    <div class="container">
        <aside class="sidebar">
            <h2>Scheduler</h2>
            <nav>
                <a href="/mainSchedule.html">Team Schedule</a>
                <a href="/availability.html">Availability</a>
                <a href="/team.html">Team</a>
                <a href="/constraints.html">Constraints</a>
                <a href="#" data-action="logout">Logout</a>
            </nav>
        </aside>

        <main class="main">
            <div class="page-header">
                <div>
                    <p class="eyebrow">Manager Schedule</p>
                    <h1>Weekly Team Schedule</h1>
                </div>
                <div class="user-chip">
                    <strong data-user-name></strong>
                    <span data-user-role></span>
                </div>
            </div>

            <p id="scheduleStatus" class="status-message" hidden></p>

            <section id="managerSchedulePanel" class="stack-lg">
                <div class="topbar">
                    <button id="previousWeekButton" class="secondary-btn">Previous Week</button>
                    <h2 id="scheduleWeekLabel"></h2>
                    <button id="nextWeekButton" class="secondary-btn">Next Week</button>
                    <span id="finalizationState" class="summary-pill"></span>
                    <button id="finalizeScheduleButton" type="button" class="primary-btn">Finalize Week</button>
                </div>

                <section class="card">
                    <h2>Scheduled Shifts</h2>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Employee</th>
                                <th>Role</th>
                                <th></th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="managerScheduleBody"></tbody>
                    </table>
                </section>

                <section class="card">
                    <h2>Week at a Glance</h2>
                    <div id="managerWeekCards" class="day-card-grid"></div>
                    <h3>Weekly Hours</h3>
                    <ul data-weekly-totals class="stack compact-list"></ul>
                </section>

                <section class="card">
                    <h2 id="shiftFormTitle">Add Shift</h2>
                    <form id="shiftForm" class="stack">
                        <input id="shiftId" type="hidden">
                        <label>
                            Employee
                            <select id="shiftUserId" required></select>
                        </label>
                        <label>
                            Date
                            <input id="shiftDate" type="date" required>
                        </label>
                        <label>
                            Start time
                            <input id="shiftStartTime" type="time" required>
                        </label>
                        <label>
                            End time
                            <input id="shiftEndTime" type="time" required>
                        </label>
                        <label>
                            Role
                            <input id="shiftRole" type="text" placeholder="Cashier, Supervisor..." required>
                        </label>
                        <label class="inline-check">
                            <input id="shiftRepeatWeekly" type="checkbox">
                            Repeat weekly
                        </label>
                        <label>
                            Repeat until
                            <input id="shiftRepeatUntil" type="date" disabled>
                        </label>
                        <ul id="shiftIssueList" class="issue-list" hidden></ul>
                        <div class="button-row">
                            <button type="submit" class="primary-btn">Save Shift</button>
                            <button id="shiftFormReset" type="button" class="secondary-btn">Clear</button>
                        </div>
                    </form>
                </section>
            </section>
        </main>
    </div>
<script src="/frontend.js"></script>
</body>
</html>
