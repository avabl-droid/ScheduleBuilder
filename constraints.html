<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scheduling Constraints</title>
    <link rel="stylesheet" href="scheduleStyles.css">
</head>

<body data-page="constraints">
<div class="container">
    <aside class="sidebar">
        <h2>Scheduler</h2>
        <nav>
            <a href="/mainSchedule.html">Team Schedule</a>
            <a href="/availability.html">Availability</a>
            <a href="/team.html">Team</a>
            <a href="/constraints.html">Constraints</a>
            <a href="#" data-action="logout">Logout</a>
        </nav>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <p class="eyebrow">Constraints</p>
                <h1>Scheduling Rules</h1>
            </div>
            <div class="user-chip">
                <strong data-user-name></strong>
                <span data-user-role></span>
            </div>
        </div>

        <form id="constraintsForm" class="stack-lg">
            <section class="card">
                <h2>Hour Limits</h2>
                <div class="form-grid">
                    <label>
                        Window length
                        <select id="hoursWindowDays">
                            <option value="7">7 days</option>
                            <option value="14">14 days</option>
                        </select>
                    </label>
                    <label>
                        Min hours per window
                        <input id="minHoursPerWindow" type="number" min="0" step="0.5">
                    </label>
                    <label>
                        Max hours per window
                        <input id="maxHoursPerWindow" type="number" min="0" step="0.5">
                    </label>
                    <label>
                        Min staff per hour
                        <input id="minStaffPerHour" type="number" min="0" step="1">
                    </label>
                    <label>
                        Max staff per hour
                        <input id="maxStaffPerHour" type="number" min="0" step="1">
                    </label>
                </div>
            </section>

            <section class="card">
                <h2>Business Hours</h2>
                <div id="businessHoursGrid" class="stack"></div>
            </section>

            <section class="card">
                <div class="section-header">
                    <h2>Role Requirements</h2>
                    <button type="button" id="addRoleRequirementButton" class="secondary-btn">Add Requirement</button>
                </div>
                <div id="roleRequirementsList" class="stack"></div>
            </section>

            <button type="submit" class="primary-btn">Save Constraints</button>
            <p id="constraintsStatus" class="status-message" hidden></p>
        </form>
    </main>
</div>
<script src="/frontend.js"></script>
</body>
</html>
