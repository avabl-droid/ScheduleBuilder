<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Account Setup</title>
    <link rel="stylesheet" href="scheduleStyles.css">
</head>

<body class="auth-body" data-page="completeSetup">
<div class="login-box wide-box">
    <h2>Complete Your Account Setup</h2>
    <p>Choose your final username and password, then add your phone number and backup email.</p>

    <form id="completeSetupForm" class="stack">
        <input id="completeTemporaryPassword" type="password" placeholder="Temporary password" required>
        <input id="completeUsername" type="text" placeholder="New username" required>
        <input id="completePhone" type="tel" placeholder="Phone number" required>
        <input id="completeSecondaryEmail" type="email" placeholder="Second email address" required>
        <input id="completeNewPassword" type="password" placeholder="New password" required>
        <input id="completeConfirmPassword" type="password" placeholder="Confirm new password" required>
        <button type="submit" class="primary-btn">Finish Setup</button>
        <p id="completeSetupStatus" class="status-message" hidden></p>
    </form>
</div>
<script src="/frontend.js"></script>
</body>
</html>
