<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Availability</title>
    <link rel="stylesheet" href="scheduleStyles.css">
</head>

<body data-page="availability">
<div class="container">
    <aside class="sidebar">
        <h2>Scheduler</h2>
        <nav>
            <a href="/mainSchedule.html" data-manager-only>Team Schedule</a>
            <a href="/employeeSchedule.html" data-employee-only>My Schedule</a>
            <a href="/availability.html">Availability</a>
            <a href="/team.html">Team</a>
            <a href="/constraints.html" data-manager-only>Constraints</a>
            <a href="#" data-action="logout">Logout</a>
        </nav>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <p class="eyebrow">Availability</p>
                <h1>Weekly Availability</h1>
            </div>
            <div class="user-chip">
                <strong data-user-name></strong>
                <span data-user-role></span>
            </div>
        </div>

        <section class="card">
            <form id="availabilityForm" class="stack-lg">
                <div id="availabilityEditor" class="stack"></div>
                <button type="submit" class="primary-btn">Save Availability</button>
                <p id="availabilityStatus" class="status-message" hidden></p>
            </form>
        </section>
    </main>
</div>
<script src="/frontend.js"></script>
</body>
</html>
