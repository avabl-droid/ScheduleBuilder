<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Schedule</title>
    <link rel="stylesheet" href="scheduleStyles.css">
</head>

<body data-page="employeeSchedule">
<div class="container">
    <aside class="sidebar">
        <h2>Scheduler</h2>
        <nav>
            <a href="/employeeSchedule.html">My Schedule</a>
            <a href="/availability.html">Availability</a>
            <a href="/team.html">Team</a>
            <a href="#" data-action="logout">Logout</a>
        </nav>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <p class="eyebrow">Schedule</p>
                <h1>My Weekly Schedule</h1>
            </div>
            <div class="user-chip">
                <strong data-user-name></strong>
                <span data-user-role></span>
            </div>
        </div>

        <div class="topbar">
            <button id="employeePreviousWeekButton" class="secondary-btn">Previous Week</button>
            <h2 id="employeeWeekLabel"></h2>
            <button id="employeeNextWeekButton" class="secondary-btn">Next Week</button>
            <div class="summary-pill">Total: <span id="employeeWeeklyHours">0 hours</span></div>
        </div>

        <p id="employeeScheduleStatus" class="status-message" hidden></p>

        <section class="card">
            <h2>Shift List</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Employee</th>
                        <th>Role</th>
                    </tr>
                </thead>
                <tbody id="employeeScheduleBody"></tbody>
            </table>
        </section>

        <section class="card">
            <h2>Week at a Glance</h2>
            <div id="employeeWeekCards" class="day-card-grid"></div>
        </section>
    </main>
</div>
<script src="/frontend.js"></script>
</body>
</html>
