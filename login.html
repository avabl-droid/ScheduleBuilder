<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="scheduleStyles.css">
</head>

<body class="auth-body" data-page="login">
<div class="login-box">
    <h2>Login</h2>
    <form id="loginForm" class="stack">
        <input name="identifier" type="text" placeholder="Email or username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit" class="primary-btn">Login</button>
        <p id="loginStatus" class="status-message" hidden></p>
    </form>
    <p class="muted"><a href="/indexSignUp.html">Need sign up options instead?</a></p>
</div>
<script src="/frontend.js"></script>
</body>
</html>
